# Ruff 配置文件
# Ruff 是 Rust 编写的超快 Python linter 和 formatter
# 文档: https://docs.astral.sh/ruff/

# 目标 Python 版本
target-version = "py312"

# 代码行长度
line-length = 120

# 排除的目录
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
    ".venv",
    "htmlcov",
    ".pytest_cache",
    "alembic",
    "reports",
]

# 启用的规则集 - 最完整配置
[lint]
select = [
    # 基础检查
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes

    # 导入排序
    "I",      # isort

    # 代码质量
    "B",      # flake8-bugbear: 常见 Bug 模式
    "C4",     # flake8-comprehensions: 推导式优化
    "SIM",    # flake8-simplify: 简化代码
    "UP",     # pyupgrade: 使用新语法

    # 命名规范
    "N",      # pep8-naming

    # 参数检查
    "ARG",    # flake8-unused-arguments: 未使用参数

    # === 异步/并发检查 ===
    "ASYNC",  # flake8-async: async 代码中的阻塞调用检测 ← 关键！

    # === 异常处理检查 ===
    "RSE",    # flake8-raise: 异常处理最佳实践
    "ERA",    # eradicate: 删除注释掉的代码
    "TRY",    # tryceratops: 异常处理反模式

    # === 返回值检查 ===
    "RET",    # flake8-return: 返回值一致性
    "FLY",    # flynt: f-string 推荐

    # === 安全检查 ===
    "S",      # flake8-bandit: 安全漏洞检测
    "T10",    # flake8-debugger: 禁止 debugger 语句

    # === 性能检查 ===
    "PERF",   # Perflint: 性能反模式
    "FURB",   # refurb: 代码现代化

    # === 类型注解检查 ===
    "ANN",    # flake8-annotations: 类型注解
    "TCH",    # flake8-type-checking: 类型检查优化

    # === 代码复杂度 ===
    "C90",    # mccabe: 圈复杂度
    "PLR",    # pylint refactor: 重构建议
    "PLW",    # pylint warnings: 潜在问题

    # === 文档检查 ===
    "D",      # pydocstyle: 文档字符串风格

    # === 其他有用规则 ===
    "RUF",    # Ruff 特定规则
    "PT",     # flake8-pytest-style: pytest 最佳实践
    "SLF",    # flake8-self: 私有成员访问
    "INP",    # flake8-no-pep420: 隐式命名空间包
    "PIE",    # flake8-pie: 不必要的代码
    "LOG",    # flake8-logging: 日志最佳实践
]

# 忽略的规则（根据项目需要调整）
ignore = [
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults
    "ARG001", # unused function argument (common in FastAPI dependencies)
    "ARG002", # unused method argument
    "N805",   # first argument of a method should be named `self`
    "N806",   # non-lowercase-variable-in-function

    # 文档字符串（根据需要调整）
    "D100",   # Missing docstring in public module
    "D101",   # Missing docstring in public class
    "D102",   # Missing docstring in public method
    "D103",   # Missing docstring in public function
    "D104",   # Missing docstring in public package
    "D105",   # Missing docstring in magic method
    "D107",   # Missing docstring in `__init__`

    # 类型注解（根据需要调整）
    "ANN001", # Missing type annotation for function argument
    "ANN002", # Missing type annotation for *args
    "ANN003", # Missing type annotation for **kwargs
    "ANN101", # Missing type annotation for self in method
    "ANN102", # Missing type annotation for cls in classmethod
    "ANN201", # Missing return type annotation for public function
    "ANN401", # Dynamically typed expressions (Any) are disallowed

    # 安全检查（根据需要调整）
    "S101",   # Use of assert detected
    "S311",   # Standard pseudo-random generators are not suitable for security

    # 复杂度（根据需要调整）
    "PLR0913", # Too many arguments
    "PLR0912", # Too many branches
    "PLR0915", # Too many statements
    "C901",   # Too complex

    # 异常处理（根据需要调整）
    "TRY003", # Avoid specifying long messages outside the exception class
    "TRY300", # Consider moving this statement to an else block

    # 返回值（根据需要调整）
    "RET504", # Unnecessary variable assignment before return
    "RET505", # Unnecessary else after return

    # 日志（根据需要调整）
    "LOG015", # Missing log message
]

# per-file-ignores
[lint.per-file-ignores]
"tests/*" = ["ARG", "S101", "PLR2004", "ANN", "D", "SLF", "TRY"]
"alembic/*" = ["ARG", "N", "D", "ANN", "INP"]
"__init__.py" = ["F401", "D"]  # Allow unused imports in __init__.py

# isort 配置
[lint.isort]
known-first-party = ["src"]

# mccabe 复杂度阈值
[lint.mccabe]
max-complexity = 15

# pylint 配置
[lint.pylint]
max-args = 8
max-branches = 15
max-returns = 6
max-statements = 60

# 格式化配置
[format]
# 使用双引号
quote-style = "double"
# 缩进使用4个空格
indent-style = "space"
# 行尾样式
line-ending = "auto"
# 保留尾随逗号
skip-magic-trailing-comma = false