version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dialog-survey-db
    environment:
      POSTGRES_USER: interview_bot
      POSTGRES_PASSWORD: interview_bot_secret
      POSTGRES_DB: interview_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interview_bot -d interview_bot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dialog-survey-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://interview_bot:interview_bot_secret@postgres:5432/interview_bot
      PORT: 3001
      HOST: 0.0.0.0
    env_file:
      - .env
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
