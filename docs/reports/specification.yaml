specification:
  title: "访谈计划支持手机号添加受访者"
  version: "1.0.0"
  issue: "#68"
  created_at: "2026-06-17T22:55:00Z"

requirements:
  - id: "REQ-001"
    title: "parseInviteeText 支持手机号格式"
    description: |
      parseInviteeText() 函数需要识别手机号格式（1开头11位数字），
      并返回带有 phone 字段的 InviteeData。
    priority: "high"
    acceptance_criteria:
      - "输入 '13800138000 张三' 返回 { phone: '13800138000', name: '张三' }"
      - "输入 'user123 李四' 返回 { userId: 'user123', name: '李四' }"
      - "手机号自动去空格、去+86前缀"

  - id: "REQ-002"
    title: "importInvitees 解析手机号为 userId"
    description: |
      importInvitees() 函数对 phone 类型的 invitee 调用 DingTalk API
      getUserIdByMobile() 解析 userId，失败则记录错误跳过。
    priority: "high"
    acceptance_criteria:
      - "phone 类型 invitee 调用 DingTalkClient.getUserIdByMobile()"
      - "成功：使用返回的 userId 和 name 创建 interview"
      - "失败：记录错误到 result.errors，不阻断其他 invitee"
      - "并发控制：批量导入时限制并发数（复用现有 concurrency=10）"

  - id: "REQ-003"
    title: "updatePlan 处理手机号格式"
    description: |
      updatePlan() 函数在处理 invitees 文本时，需要对手机号格式的 invitee
      调用 DingTalk API 解析 userId。
    priority: "high"
    acceptance_criteria:
      - "invitees 文本中的手机号格式被正确识别"
      - "手机号通过 DingTalk API 解析为 userId"
      - "解析失败的 invitee 记录错误但不阻断"

  - id: "REQ-004"
    title: "plan-form.njk UI 提示更新"
    description: |
      更新访谈计划表单的受访人员输入框提示文本，说明支持手机号格式。
    priority: "medium"
    acceptance_criteria:
      - "提示文本包含「手机号 姓名」格式说明"
      - "已编辑模式下正确显示手机号格式的 invitee"

  - id: "REQ-005"
    title: "plan-detail.njk 成员添加支持手机号"
    description: |
      计划详情页的成员添加表单新增手机号输入框，支持按手机号添加成员。
    priority: "medium"
    acceptance_criteria:
      - "添加成员表单包含手机号输入框"
      - "手机号输入框与 userId 输入框并列显示"
      - "提交时传递 phone 参数到 API"
      - "成功添加后刷新成员列表"

constraints:
  - "复用现有 DingTalkClient.getUserIdByMobile() 实现"
  - "复用现有 addMember() 的 phone → userId 解析逻辑"
  - "保持向后兼容：userId 格式仍被支持"
  - "错误处理：DingTalk API 失败不阻断批量导入"
  - "并发控制：复用现有 concurrency=10 设置"

dependencies:
  - "DingTalkClient.getUserIdByMobile() 已实现"
  - "addMember() 已支持 phone 参数"
  - "addMemberSchema 已支持 phone 字段验证"

testing:
  unit_tests:
    - "parseInviteeText() 识别手机号格式"
    - "parseInviteeText() 混合格式处理"
  integration_tests:
    - "importInvitees() 解析手机号 → userId"
    - "updatePlan() 处理手机号格式 invitees"
    - "POST /api/plans/:id/members 支持 phone 参数"
  ui_tests:
    - "plan-form.njk 提示文本更新"
    - "plan-detail.njk 成员添加表单"

success_metrics:
  - "手机号格式 invitee 能被正确识别和解析"
  - "DingTalk API 解析失败时记录错误但不阻断"
  - "UI 提示清晰，用户能理解新格式"
  - "所有现有测试通过"
