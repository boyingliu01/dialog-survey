[pytest]
# pytest 配置文件
# 文档: https://docs.pytest.org/

# 测试文件匹配模式
python_files = test_*.py *_test.py
# 测试类匹配模式
python_classes = Test*
# 测试函数匹配模式
python_functions = test_*

# 测试目录
testpaths = tests

# 最小 Python 版本
minversion = 7.0

# 异步支持
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 命令行选项
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    -ra

# 标记定义
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    e2e: marks tests as end-to-end tests

# 日志配置
log_cli = false
log_cli_level = INFO

# 覆盖率配置 (可选运行: pytest --cov=src)
[coverage:run]
source = src
omit =
    */tests/*
    */__pycache__/*
    */alembic/*
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod