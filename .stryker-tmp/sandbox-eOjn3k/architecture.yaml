version: 1
layers:
  api:
    pattern: "src/api/**"
    depends: [services, integrations]
  services:
    pattern: "src/services/**"
    depends: [repositories, core, integrations]
  core:
    pattern: "src/core/**"
    depends: [repositories]
  repositories:
    pattern: "src/repositories/**"
    depends: []
  integrations:
    pattern: "src/integrations/**"
    depends: []
  utils:
    pattern: "src/utils/**"
    depends: []
