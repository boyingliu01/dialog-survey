# specification.yaml - 访谈模板管理界面
# Auto-generated: 2026-04-26
# Source: docs/plans/2026-04-26-template-management-ui-design.md
# Delphi Review: Round 2 APPROVED (2/2 experts)

features:
  admin_ui:
    status: completed
    description: "访谈模板管理界面：HTMX 服务端渲染 + 约束保护"
  followup_depth:
    status: in_progress
    description: "智能追问深度优化 + 一次一问保证 + 优雅收尾 + 模板试算验证"
    requirements:
      - id: REQ-015
        title: "一次只问一个问题（修复双重提问 Bug）"
        priority: critical
        description: "用户实际测试中 3 次反馈一次问了两个问题"
        acceptance_criteria:
          - "LLM 回应不包含下一个问题的内容"
          - "代码只在 LLM 回应后追加下一个问题"
          - "用户不会同时看到两个问题"
      - id: REQ-016
        title: "智能追问优化 — 深度洞察用户经验和建议"
        priority: critical
        description: "当前追问停留在表面（'具体是什情况？'），应该深入挖掘用户的具体经验、个人体验、解决建议"
        acceptance_criteria:
          - "追问引导用户描述具体场景而非抽象概念"
          - "追问挖掘用户的亲身经历细节（'当时是什么情况？'）"
          - "追问引导用户提出自己的解决建议（'如果让您来改进，您会怎么做？'）"
          - "追问探寻用户的真实想法而非官方回答"
      - id: REQ-017
        title: "最后一个问题优雅收尾"
        priority: critical
        description: "用户反馈最后一个问题结束后直接说'访谈已完成'，太生硬"
        acceptance_criteria:
          - "对最后一个问题的回答先做温暖的回应和理解"
          - "然后再展示结束语"
          - "格式：[对最后回答的理解] + [温暖的结束语]"
      - id: REQ-018
        title: "模板试算验证功能"
        priority: high
        description: "设计新模板时，提供试算功能让用户模拟访谈体验，验证问题和追问效果"
        acceptance_criteria:
          - "模板编辑页面有'试算'按钮"
          - 点击后打开模拟对话窗口
          - "模拟用户回答（可选预设场景：认真回答/敷衍/拒绝）"
          - "展示 LLM 主持人回应质量"
          - "可多次试算不同场景"
          - "试算满意后才允许发布模板"
      - id: REQ-019
        title: "对话式访谈模板"
        priority: high
        description: "将问卷式打分/选择题改造为开放式对话题"
        acceptance_criteria:
          - "模板问题使用开放式问法"
          - "不要包含'请打分'、'请选择最多N项'等封闭式选项"
          - "每个问题都能引发用户分享经验和故事"
          - "移除个人信息收集问题（产品线、岗位角色）"
          - "移除结束语中的'联系方式'问题"
  - id: REQ-001
    title: "依赖集成"
    priority: must
    description: "集成 @fastify/view + @fastify/static + nunjucks 到现有 Fastify 5.x ESM 项目"
    acceptance_criteria:
      - "npm install @fastify/view @fastify/static nunjucks 成功执行"
      - "Fastify 启动时 @fastify/view 已注册，Nunjucks 可渲染 .njk 模板"
      - "src/views/ 目录存在且包含 layouts/ 和 templates/ 子目录"
      - "public/ 目录注册为静态资源根目录"
      - "package.json 依赖已记录"

  - id: REQ-002
    title: "Admin Auth 中间件"
    priority: must
    description: "实现 API Key 认证中间件保护 /admin/ 管理路由"
    acceptance_criteria:
      - "src/middleware/admin-auth.ts 存在且使用 X-Admin-Key header"
      - "无正确 X-Admin-Key 的请求被拒绝（401）"
      - "中间件仅作用于 /admin/ 前缀路由"
      - "ADMIN_API_KEY 从环境变量读取"

  - id: REQ-003
    title: "Repository 扩展方法"
    priority: must
    description: "在 TemplateRepository 中新增三个方法"
    acceptance_criteria:
      - "updateWithVersion(id, expectedVersion, data) 使用乐观锁 where: { id, version } 且 version: { increment: 1 }"
      - "findAllPaginated(page, limit) 返回 { items, total, page, limit }"
      - "getUsageStats(templateId) 返回 UsageStats（interviews 按状态分组计数 + plans 按状态分组计数 + reports 计数）"
      - "所有方法有单元测试覆盖"

  - id: REQ-004
    title: "管理路由 — 列表页"
    priority: must
    description: "GET /admin/templates 返回 SSR 渲染的模板列表 HTML 页面"
    acceptance_criteria:
      - "页面展示表格：名称、状态（颜色标识）、版本、访谈数（总数/进行中）、创建时间、操作按钮"
      - "支持分页 ?page=1&limit=20"
      - "HTMX 请求 GET /admin/api/templates?page=N 返回 HTML 行片段"
      - "需通过 admin-auth 认证"

  - id: REQ-005
    title: "管理路由 — 新建模板"
    priority: must
    description: "GET /admin/templates/new 返回 SSR 新建表单页面 + POST 创建"
    acceptance_criteria:
      - "表单字段：名称、描述、邀约提示词、问题列表（动态增/删/上移/下移）、结束语"
      - "Alpine.js 驱动动态问题行"
      - "提交后写入数据库，重定向到列表页"
      - "表单验证失败返回错误提示"

  - id: REQ-006
    title: "管理路由 — 编辑模板"
    priority: must
    description: "GET /admin/templates/:id/edit 返回 SSR 编辑表单页面 + PUT 更新"
    acceptance_criteria:
      - "加载模板后 JSON.parse(content) 映射到表单字段"
      - "表单包含隐藏 version 字段用于乐观锁"
      - "PUT 通过 updateWithVersion 更新，version 不匹配返回 409"
      - "成功更新后返回新版本 + 重定向"

  - id: REQ-007
    title: "管理路由 — 删除模板（含约束检查）"
    priority: must
    description: "DELETE /admin/api/templates/:id 需先检查关联数据使用情况再决定是否允许删除"
    acceptance_criteria:
      - "有 ACTIVE/WAITING 关联 Interview → 拒绝删除（409 + 错误信息）"
      - "仅低风险关联（COMPLETED/PENDING/CANCELLED）→ 允许删除"
      - "无关联 → 允许删除"
      - "删除成功后刷新列表页"
      - "前端删除按钮点击前弹出确认弹窗展示使用统计"

  - id: REQ-008
    title: "管理路由 — 使用情况查询"
    priority: must
    description: "GET /admin/api/templates/:id/usage 返回 JSON 格式的使用统计"
    acceptance_criteria:
      - "返回 { interviews: {active, pending, completed, cancelled, total}, plans: {running, pending, completed, total}, safeToDelete }"
      - "使用 Prisma groupBy count 查询，非 findMany 加载"
      - "HTMX/Alpine 消费此接口渲染确认弹窗"

  - id: REQ-009
    title: "错误处理"
    priority: must
    description: "各 HTTP 状态码有对应的用户提示和操作"
    acceptance_criteria:
      - "401: 认证失败提示"
      - "404: 模板已不存在，关闭弹窗刷新列表"
      - "409: 乐观锁冲突/高风险拒绝，展示冲突信息 + 刷新按钮"
      - "422: 表单验证错误内联展示"
      - "实现使用 HTMX hx-on::htmx:afterRequest 统一处理"

  - id: REQ-010
    title: "REST API 不变"
    priority: must
    description: "现有 /api/templates REST API 行为保持不变"
    acceptance_criteria:
      - "POST/GET/PUT/DELETE /api/templates 接口签名不变"
      - "管理路由使用 /admin/ 前缀，不产生路由冲突"
      - "TemplateRepository 原有方法签名不变（updateWithVersion 是新增）"

  - id: REQ-011
    title: "安全"
    priority: must
    description: "XSS/CSRF/认证保护"
    acceptance_criteria:
      - "Nunjucks 自动 HTML 转义"
      - "X-Admin-Key header 校验"
      - "无 console.log 在生产代码中"

  - id: REQ-012
    title: "测试"
    priority: must
    description: "Repository 方法 + API 路由 + 约束验证的测试覆盖"
    acceptance_criteria:
      - "updateWithVersion 乐观锁冲突测试"
      - "findAllPaginated 分页测试"
      - "getUsageStats 统计准确性测试"
      - "DELETE 约束检查测试（ACTIVE 拒绝 / 低风险允许）"
      - "整体覆盖率不低于项目基线 80%"

  - id: REQ-013
    title: "类型检查 + Lint"
    priority: must
    description: "npm run type-check 和 npm run check 通过"
    acceptance_criteria:
      - "tsc --noEmit 无错误"
      - "biome check 无 error"
      - "无新增 any 类型使用"

  - id: REQ-014
    title: "速率限制"
    priority: should
    description: "管理路由使用简单固定窗口计数限流（非排队模型），超限返回 429"
    acceptance_criteria:
      - "onRequest hook 实现计数器"
      - "超限直接返回 429"
      - "不复用现有的排队型 rate-limiter.ts"

constraints:
  - "不破坏现有 REST API 契约"
  - "HTMX / Alpine / Tailwind 走 CDN + 本地缓存兜底"
  - "仅内网使用管理页面"
  - "content JSON 结构变更时表单应兼容"
  - "dimensions 字段不在管理表单内编辑"

tech_stack:
  - Fastify 5.x
  - TypeScript strict mode
  - Prisma ORM + PostgreSQL
  - HTMX 2.x
  - Nunjucks via @fastify/view
  - Alpine.js 3.x
  - Tailwind CSS 3.x CDN
  - Vitest

architecture:
  routes:
    - path: "/admin/templates"
      method: "GET"
      response: "HTML (完整页面)"
    - path: "/admin/templates/new"
      method: "GET"
      response: "HTML (完整页面)"
    - path: "/admin/templates/:id/edit"
      method: "GET"
      response: "HTML (完整页面)"
    - path: "/admin/api/templates"
      method: "GET"
      response: "HTML 片段 (HTMX 行列表 + 分页)"
    - path: "/admin/api/templates/:id"
      method: "GET"
      response: "JSON"
    - path: "/admin/api/templates/:id/usage"
      method: "GET"
      response: "JSON"
    - path: "/admin/api/templates"
      method: "POST"
      response: "HTML 片段 (成功/错误)"
    - path: "/admin/api/templates/:id"
      method: "PUT"
      response: "HTML 片段 (含 warnings)"
    - path: "/admin/api/templates/:id"
      method: "DELETE"
      response: "HTML 片段 (成功/错误)"
  files:
    - src/api/admin-templates.ts
    - src/middleware/admin-auth.ts
    - src/repositories/template.repository.ts (扩展)
    - src/server.ts (注册新路由)
    - src/views/layouts/admin.njk
    - src/views/templates/index.njk
    - src/views/templates/form.njk
    - src/views/templates/row.njk
    - src/views/templates/delete-modal.njk
    - src/views/templates/usage-warning.njk
    - public/js/htmx.min.js
    - public/js/alpine.min.js
    - tests/admin-templates.test.ts
